<!DOCTYPE html>
<html>
<head>
    <title>Company Webpage</title>
</head>
<body>

<h2 style="text-align:center;">Company Forms</h2>

<div style="display:flex; justify-content:space-around;">

    <!-- Login Form -->
    <iframe width="45%" height="300"
        srcdoc='
        <h3>Login Form</h3>
        <form>
            Username:<br>
            <input type="text"><br><br>

            Password:<br>
            <input type="password"><br><br>

            <input type="submit" value="Login">
        </form>
        '>
    </iframe>

    <!-- Registration Form -->
    <iframe width="45%" height="300"
        srcdoc='
        <h3>Registration Form</h3>
        <form>
            Name:<br>
            <input type="text"><br><br>

            Email:<br>
            <input type="email"><br><br>

            Password:<br>
            <input type="password"><br><br>

            <input type="submit" value="Register">
        </form>
        '>
    </iframe>

</div>

</body>
</html>
