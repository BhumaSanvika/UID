<!DOCTYPE html>
<html>
<head>
    <title>Online Admission Form</title>
</head>

<body bgcolor="lightblue">

    <center>
        <h2>COLLEGE ONLINE ADMISSION FORM</h2>
    </center>

    <form>
        <table border="1" align="center" cellpadding="8" bgcolor="white">

            <tr>
                <td><label>First Name:</label></td>
                <td><input type="text" name="fname"></td>
            </tr>

            <tr>
                <td><label>Last Name:</label></td>
                <td><input type="text" name="lname"></td>
            </tr>

            <tr>
                <td><label>Date of Birth:</label></td>
                <td><input type="date" name="dob"></td>
            </tr>

            <tr>
                <td><label>Gender:</label></td>
                <td>
                    <input type="checkbox" name="gender" value="Male"> Male
                    <input type="checkbox" name="gender" value="Female"> Female
                </td>
            </tr>

            <tr>
                <td><label>Email:</label></td>
                <td><input type="email" name="email"></td>
            </tr>

            <tr>
                <td><label>Phone Number:</label></td>
                <td><input type="text" name="phone"></td>
            </tr>

            <tr>
                <td><label>Address:</label></td>
                <td><textarea rows="3" cols="20" style="font-family: 'Times New Roman', Times, serif;"></textarea></td>
            </tr>

            <tr>
                <td><label>Course:</label></td>
                <td>
                    <select name="course">
                        <option>B.Tech</option>
                        <option>B.Sc</option>
                        <option>B.Com</option>
                        <option>BBA</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
