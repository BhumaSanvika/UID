<!DOCTYPE html>
<html>
<head>
<title>Sanvi Mart</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Verdana;
}

body{
background:#f1f6ff;
}

/* HEADER */

header{
background:linear-gradient(90deg,#6a11cb,#2575fc);
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}

/* SALE */

.sale{
background:#ff4d6d;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
}

/* LAYOUT */

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:white;
padding:20px;
border-right:2px solid #ddd;
}

.sidebar h3{
margin-bottom:15px;
}

.sidebar label{
display:block;
padding:10px;
margin-bottom:10px;
background:#e3ecff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.sidebar label:hover{
background:#c8d8ff;
}

/* PRODUCTS */

.products{
flex:1;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.card h4{
margin:10px 0;
}

.price{
color:#ff006e;
font-weight:bold;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#06d6a0;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#04b383;
}

/* FOOTER */

footer{
background:#2575fc;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

/* RADIO BUTTONS */

input{
display:none;
}

/* CATEGORY FILTER */

#electronics:checked ~ .container .electronics{display:block;}
#electronics:checked ~ .container .clothing,
#electronics:checked ~ .container .books,
#electronics:checked ~ .container .appliances{display:none;}

#clothing:checked ~ .container .clothing{display:block;}
#clothing:checked ~ .container .electronics,
#clothing:checked ~ .container .books,
#clothing:checked ~ .container .appliances{display:none;}

#books:checked ~ .container .books{display:block;}
#books:checked ~ .container .electronics,
#books:checked ~ .container .clothing,
#books:checked ~ .container .appliances{display:none;}

#appliances:checked ~ .container .appliances{display:block;}
#appliances:checked ~ .container .electronics,
#appliances:checked ~ .container .clothing,
#appliances:checked ~ .container .books{display:none;}

@media(max-width:768px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>
</head>

<body>

<header>
Sanvi  Cart
</header>

<div class="sale">
🔥 MEGA SALE – UP TO 60% OFF
</div>

<input type="radio" name="cat" id="electronics" checked>
<input type="radio" name="cat" id="clothing">
<input type="radio" name="cat" id="books">
<input type="radio" name="cat" id="appliances">

<div class="container">

<div class="sidebar">
<h3>Categories</h3>

<label for="electronics">Electronics</label>
<label for="clothing">Women's Clothing</label>
<label for="books">Books</label>
<label for="appliances">Home Appliances</label>

</div>

<div class="products">

<!-- ELECTRONICS -->

<div class="card electronics">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h4>Smartphone</h4>
<p class="price">₹25,000</p>
<button>Buy</button>
</div>

<div class="card electronics">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
<h4>Laptop</h4>
<p class="price">₹55,000</p>
<button>Buy</button>
</div>

<div class="card electronics">
<img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/camera-1867184_1280.jpg">
<h4>Camera</h4>
<p class="price">₹30,000</p>
<button>Buy</button>
</div>

<!-- WOMEN CLOTHING -->

<div class="card clothing">
<img src="https://images.unsplash.com/photo-1568252542512-9fe8fe9c87bb">
<h4>Women Dress</h4>
<p class="price">₹1200</p>
<button>Buy</button>
</div>

<div class="card clothing">
<img src="https://images.unsplash.com/photo-1602370463198-086436840055">
<h4>Women Jacket</h4>
<p class="price">₹2000</p>
<button>Buy</button>
</div>

<!-- BOOKS -->

<div class="card books">
<img src="https://images.unsplash.com/photo-1619164025195-985d31ae8844">
<h4>Novel</h4>
<p class="price">₹500</p>
<button>Buy</button>
</div>

<div class="card books">
<img src="https://images.unsplash.com/photo-1580121441575-41bcb5c6b47c">
<h4>Programming Book</h4>
<p class="price">₹700</p>
<button>Buy</button>
</div>

<!-- HOME APPLIANCES -->

<div class="card appliances">
<img src="https://images.unsplash.com/photo-1721613877687-c9099b698faa">
<h4>Refrigerator</h4>
<p class="price">₹30000</p>
<button>Buy</button>
</div>

<div class="card appliances">
<img src="https://images.unsplash.com/photo-1626806787461-102c1bfaaea1">
<h4>Washing Machine</h4>
<p class="price">₹20000</p>
<button>Buy</button>
</div>

</div>
</div>

<footer>
© 2026 Trendy Cart | All Rights Reserved
</footer>

</body>
</html>
