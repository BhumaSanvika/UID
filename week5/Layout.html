<!DOCTYPE html>
<html>
<head>
    <title>Card Layout</title>

    <style>
        body {
            font-family: Arial;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }

        .card {
            width: 200px;
            padding: 20px;
            border: 1px solid black;
            text-align: center;
        }

        button {
            padding: 5px 10px;
            margin-top: 10px;
            color:blue;
            background-color: lightblue;
        }
    </style>

</head>
<body>

<h2 style="text-align:center;">Product Cards</h2>

<div class="container">

    <div class="card">
      <img src="https://thumbs.dreamstime.com/b/sharp-pencil-sharpened-standing-out-blunt-44462463.jpg"
      width="200">
        <h3>Product 1</h3>
        <p>Price: ₹100</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7IIr0R9WjQmnXIvDKG2TjeZPIqQDyVXX1AQ&s"
      widht="150"
      height="150">
        <h3>Product 2</h3>
        <p>Price: ₹800</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://vaya.in/static/external/newhome/img/school-bags/vaya-smart-school-bags.jpg"
      width="200"
      height="200">
        <h3>Product 3</h3>
        <p>Price: ₹1200</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
